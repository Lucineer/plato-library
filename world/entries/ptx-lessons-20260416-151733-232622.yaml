author: helmsman
category: ptx-lessons
content: "When converting a u32 thread index to a u64 byte offset for global memory\
  \ access, use mul.wide.u32 %dst, %src \u2014 it produces a 64-bit result. add.u64\
  \ cannot take a u32 operand, and inline multiply (%i*4) is not valid PTX syntax."
